name: Data Refresh

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Leave blank to use default behavior."
        required: false
        type: string
  schedule:
    # 16:10 JST (07:10 UTC) every day
    - cron: "10 7 * * *"

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run ingestion
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "Manual run with date=${{ github.event.inputs.date }}"
            npm run ingest -- --date="${{ github.event.inputs.date }}"
          else
            echo "Scheduled/default run"
            npm run ingest
          fi

      - name: Commit normalized data if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/normalized)" ]; then
            echo "No changes in data/normalized"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized
          git commit -m "chore(data): refresh normalized dashboard data"
          git push
