name: Data Refresh

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "now"
        type: choice
        options:
          - now
          - daily
          - backfill
      date:
        description: "Target date (YYYY-MM-DD). Used mainly with mode=now or mode=daily."
        required: false
        type: string
      from:
        description: "Backfill start date (YYYY-MM-DD). Used with mode=backfill."
        required: false
        type: string
      to:
        description: "Backfill end date (YYYY-MM-DD). Used with mode=backfill."
        required: false
        type: string
      force:
        description: "Force refresh even if normalized file already exists."
        required: false
        default: false
        type: boolean
  schedule:
    # 15:10 / 18:10 JST: intraday snapshot for today + yesterday
    - cron: "10 6,9 * * *"
    # 13:10 / 16:10 / 21:10 JST: refresh recent fixed datasets
    # NOTE: OCCTO publishes previous-day data around 13 JST; earlier runs were removed
    - cron: "10 4,7,12 * * *"

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run ingestion
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "10 4,7,12 * * *" ]; then
              FROM="$(TZ=Asia/Tokyo date -d '4 days ago' '+%Y-%m-%d')"
              TO="$(TZ=Asia/Tokyo date -d '1 day ago' '+%Y-%m-%d')"
              echo "Scheduled fixed-data refresh for recent dates: ${FROM}..${TO}"
              npm run ingest -- --mode=backfill --from="${FROM}" --to="${TO}" --sample=daily --force=true
            else
              echo "Scheduled intraday refresh: today + yesterday"
              npm run ingest -- --mode=now --force=true || true
              npm run ingest -- --mode=daily --force=true
            fi
          else
            MODE="${{ github.event.inputs.mode }}"
            DATE="${{ github.event.inputs.date }}"
            FROM="${{ github.event.inputs.from }}"
            TO="${{ github.event.inputs.to }}"
            FORCE="${{ github.event.inputs.force }}"

            CMD=("npm" "run" "ingest" "--" "--mode=${MODE}" "--force=${FORCE}")
            if [ -n "${DATE}" ]; then
              CMD+=("--date=${DATE}")
            fi
            if [ -n "${FROM}" ]; then
              CMD+=("--from=${FROM}")
            fi
            if [ -n "${TO}" ]; then
              CMD+=("--to=${TO}")
            fi

            echo "Manual run command: ${CMD[*]}"
            "${CMD[@]}"
          fi

      - name: Commit normalized data if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data/normalized)" ]; then
            echo "No changes in data/normalized"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized
          git commit -m "chore(data): refresh normalized dashboard data"
          git push
