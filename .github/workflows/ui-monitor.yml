name: UI Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,6,12,18 * * *"

concurrency:
  group: ui-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  monitor-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Monitor deployed dashboard
        env:
          PLAYWRIGHT_BASE_URL: https://hama-jp.github.io/occto-grid-observatory/
        run: npm run test:ui:public

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-monitor-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "[UI Monitor] GitHub Pages health check failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "GitHub Pages の定期 UI 監視が失敗しました。",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- SHA: ${context.sha}`,
              `- Event: ${context.eventName}`,
              `- UTC: ${new Date().toISOString()}`,
              "",
              "確認ポイント:",
              "- Playwright report artifact を開く",
              "- 公開URLの表示崩れ、データ取得失敗、選択UIの異常を確認する",
              "- 修正後に UI Monitor を再実行する",
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
